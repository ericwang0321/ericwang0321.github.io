<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 全产业链闭环交互信息图</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --paper: #ffffff;
      --paper-soft: #fbfaf7;
      --ink: #20242a;
      --muted: #68717c;
      --line: #dde2e7;
      --line-soft: #edf0f2;
      --blue: #2563eb;
      --green: #168a61;
      --violet: #7c3aed;
      --amber: #b7791f;
      --red: #c24135;
      --shadow: 0 20px 54px rgba(32, 36, 42, .08);
      --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      line-height: 1.55;
    }

    button {
      appearance: none;
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
    }

    a { color: inherit; }

    .page {
      width: min(1500px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 42px;
    }

    .shell {
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--paper);
      box-shadow: var(--shadow);
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: end;
      padding: 26px;
      border-bottom: 1px solid var(--line-soft);
      background: var(--paper);
    }

    .eyebrow {
      margin: 0 0 7px;
      color: var(--green);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 780;
      text-transform: uppercase;
    }

    h1, h2, h3, h4, p { margin-top: 0; }

    h1 {
      margin-bottom: 8px;
      font-size: clamp(32px, 4vw, 52px);
      line-height: 1.06;
      letter-spacing: 0;
    }

    .lead {
      max-width: 980px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .read-card {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--paper-soft);
      font-size: 12px;
    }

    .read-card strong { font-size: 13px; }
    .read-card span { color: var(--muted); line-height: 1.4; }

    .title-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }

    .title-tools .eyebrow {
      margin: 0;
    }

    .lang-toggle {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--paper-soft);
    }

    .lang-button {
      cursor: pointer;
      padding: 5px 9px;
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
      line-height: 1;
    }

    .lang-button.active {
      background: var(--green);
      color: #fff;
    }

    .content {
      display: grid;
      gap: 18px;
      padding: 18px;
    }

    .flow-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--paper-soft);
    }

    .flow-step {
      --tone: var(--green);
      position: relative;
      min-width: 0;
      cursor: pointer;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      text-align: left;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }

    .flow-step::after {
      content: "→";
      position: absolute;
      top: 50%;
      right: -14px;
      z-index: 2;
      transform: translateY(-50%);
      color: #aab2bb;
      font-family: var(--mono);
      font-weight: 800;
    }

    .flow-step:last-child::after { display: none; }
    .flow-step.application { --tone: var(--blue); }
    .flow-step.model { --tone: var(--green); }
    .flow-step.compute { --tone: var(--violet); }
    .flow-step.semi { --tone: var(--amber); }
    .flow-step.energy { --tone: var(--red); }

    .flow-step:hover,
    .flow-step.active {
      border-color: color-mix(in srgb, var(--tone) 55%, var(--line));
      box-shadow: 0 14px 30px rgba(32, 36, 42, .08);
      transform: translateY(-1px);
    }

    .flow-step em {
      display: inline-flex;
      margin-bottom: 7px;
      padding: 3px 7px;
      border-radius: 999px;
      background: color-mix(in srgb, var(--tone) 12%, #fff);
      color: var(--tone);
      font-family: var(--mono);
      font-size: 10px;
      font-style: normal;
      font-weight: 800;
    }

    .flow-step strong {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .flow-step span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(360px, .42fr) minmax(0, .58fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--paper);
    }

    .panel-pad { padding: 16px; }

    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: start;
      margin-bottom: 14px;
    }

    .panel-head h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .hint {
      max-width: 360px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      text-align: right;
    }

    .layer-stack {
      display: grid;
      gap: 10px;
    }

    .layer-button {
      --tone: var(--green);
      display: grid;
      grid-template-columns: 58px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      width: 100%;
      cursor: pointer;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: linear-gradient(180deg, #fff, var(--paper-soft));
      text-align: left;
      transition: border-color .16s ease, box-shadow .16s ease, transform .16s ease;
    }

    .layer-button.application { --tone: var(--blue); }
    .layer-button.model { --tone: var(--green); }
    .layer-button.compute { --tone: var(--violet); }
    .layer-button.semi { --tone: var(--amber); }
    .layer-button.energy { --tone: var(--red); }

    .layer-button:hover,
    .layer-button.active {
      border-color: color-mix(in srgb, var(--tone) 58%, var(--line));
      box-shadow: 0 14px 32px rgba(32, 36, 42, .08);
      transform: translateY(-1px);
    }

    .layer-no {
      display: grid;
      place-items: center;
      width: 54px;
      height: 54px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--tone);
      font-family: var(--mono);
      font-size: 17px;
      font-weight: 800;
    }

    .layer-button h3 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .layer-button p {
      margin: 0;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .audit-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--line-soft);
    }

    .audit-list h3 {
      margin: 0;
      font-size: 15px;
    }

    .audit-list p {
      margin: 0;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.42;
    }

    .detail {
      --tone: var(--green);
      overflow: hidden;
    }

    .detail-head {
      padding: 16px;
      border-bottom: 1px solid var(--line-soft);
      background: linear-gradient(180deg, color-mix(in srgb, var(--tone) 10%, #fff), #fff);
    }

    .detail-head.application { --tone: var(--blue); }
    .detail-head.model { --tone: var(--green); }
    .detail-head.compute { --tone: var(--violet); }
    .detail-head.semi { --tone: var(--amber); }
    .detail-head.energy { --tone: var(--red); }

    .detail-head h2 {
      margin: 0 0 8px;
      font-size: 26px;
      line-height: 1.16;
      letter-spacing: 0;
    }

    .summary {
      margin: 0;
      color: #39424d;
      font-size: 15px;
    }

    .detail-body {
      display: grid;
      gap: 14px;
      padding: 16px;
    }

    .meta-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .meta-box,
    .info-card,
    .company-card,
    .process-card,
    .role-card,
    .source-card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .meta-box {
      padding: 11px;
    }

    .meta-box strong,
    .info-card strong {
      display: block;
      margin-bottom: 5px;
      font-size: 12px;
      line-height: 1.2;
    }

    .meta-box span,
    .info-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.38;
      overflow-wrap: anywhere;
    }

    .chain {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--paper-soft);
    }

    .chain b {
      padding: 6px 8px;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      font-size: 12px;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .chain i {
      color: var(--green);
      font-family: var(--mono);
      font-style: normal;
      font-weight: 800;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .info-card {
      padding: 12px;
    }

    .pill-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pill {
      max-width: 100%;
      padding: 5px 7px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: var(--paper-soft);
      color: #303740;
      font-size: 11.5px;
      line-height: 1.18;
      overflow-wrap: anywhere;
    }

    .company-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 9px;
    }

    .company-card {
      padding: 11px;
    }

    .company-card h4,
    .process-card h3,
    .role-card h3,
    .source-card h3 {
      margin: 0 0 6px;
      font-size: 14px;
      line-height: 1.2;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .company-card p,
    .process-card p,
    .role-card p,
    .source-card p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.38;
      overflow-wrap: anywhere;
    }

    .company-card small {
      display: block;
      margin-top: 8px;
      padding-top: 7px;
      border-top: 1px solid var(--line-soft);
      color: #43505d;
      font-size: 11.5px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .section {
      display: grid;
      gap: 12px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 15px;
      background: var(--paper);
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: end;
    }

    .section-head h2 {
      margin: 0;
      font-size: 21px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .process-grid {
      display: grid;
      grid-template-columns: repeat(var(--cols), minmax(0, 1fr));
      gap: 10px;
    }

    .process-card {
      position: relative;
      padding: 12px;
    }

    .process-card::after {
      content: "→";
      position: absolute;
      top: 50%;
      right: -13px;
      transform: translateY(-50%);
      color: #aab2bb;
      font-family: var(--mono);
      font-weight: 800;
    }

    .process-card:last-child::after { display: none; }

    .process-card em {
      display: inline-flex;
      margin-bottom: 7px;
      padding: 2px 7px;
      border-radius: 999px;
      background: var(--paper-soft);
      color: var(--green);
      font-family: var(--mono);
      font-size: 10px;
      font-style: normal;
      font-weight: 800;
    }

    .branch-grid,
    .role-grid,
    .source-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .role-card,
    .source-card {
      padding: 12px;
    }

    .role-card.active {
      border-color: rgba(22, 138, 97, .48);
      background: #f7fcfa;
    }

    .role-chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin: 8px 0;
    }

    .role-chip {
      padding: 3px 6px;
      border: 1px solid var(--line-soft);
      border-radius: 7px;
      background: var(--paper-soft);
      color: #3c4650;
      font-size: 10.5px;
      line-height: 1.1;
    }

    .role-chip.current {
      border-color: rgba(22, 138, 97, .38);
      background: #eaf7f0;
      color: var(--green);
      font-weight: 760;
    }

    .source-card a {
      color: #1f5fbf;
      font-size: 12px;
      overflow-wrap: anywhere;
    }

    .visual-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .visual-grid.single {
      grid-template-columns: 1fr;
    }

    .visual-grid.single .visual-card {
      width: 100%;
      max-width: 1080px;
      margin-inline: auto;
    }

    .visual-card {
      min-width: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .visual-card.wide {
      grid-column: 1 / -1;
    }

    .visual-card img {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 1672 / 941;
      object-fit: contain;
      background: #fff;
      border-bottom: 1px solid var(--line-soft);
    }

    .visual-copy {
      display: grid;
      gap: 5px;
      padding: 11px;
    }

    .visual-copy h3 {
      margin: 0;
      font-size: 14px;
      line-height: 1.25;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .visual-copy p {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      overflow-wrap: anywhere;
    }

    .visual-points {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 4px;
    }

    .visual-point {
      min-width: 0;
      padding: 8px;
      border: 1px solid var(--line-soft);
      border-radius: 8px;
      background: #f8fafc;
    }

    .visual-point strong {
      display: block;
      margin-bottom: 3px;
      color: var(--ink);
      font-size: 11px;
      line-height: 1.2;
      overflow-wrap: anywhere;
    }

    .visual-point span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .glossary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .term-card {
      min-width: 0;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
    }

    .term-card a {
      display: block;
      margin-bottom: 5px;
      color: #1f5fbf;
      font-size: 13px;
      font-weight: 780;
      line-height: 1.2;
      overflow-wrap: anywhere;
      text-decoration: none;
    }

    .term-card a:hover {
      text-decoration: underline;
    }

    .term-card span,
    .term-card p {
      display: block;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .term-card p + p {
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--line-soft);
    }

    .term-card b {
      margin-right: 6px;
      color: var(--text);
      font-weight: 760;
    }

    .term-card em {
      display: inline-flex;
      margin-top: 8px;
      padding: 2px 6px;
      border-radius: 7px;
      background: var(--paper-soft);
      color: var(--green);
      font-family: var(--mono);
      font-size: 10px;
      font-style: normal;
      font-weight: 760;
    }

    .disclaimer {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    @media (max-width: 1180px) {
      header,
      .workspace {
        grid-template-columns: 1fr;
      }

      .hint { text-align: left; }
      .flow-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .flow-step::after { display: none; }
      .process-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .branch-grid, .source-grid, .visual-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .visual-points { grid-template-columns: 1fr; }
      .glossary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 760px) {
      .page {
        width: min(100% - 14px, 1500px);
        padding-top: 8px;
      }

      header {
        padding: 18px 14px;
      }

      .content {
        padding: 12px;
      }

      .flow-strip,
      .meta-grid,
      .info-grid,
      .company-grid,
      .process-grid,
      .branch-grid,
      .role-grid,
      .source-grid,
      .visual-grid,
      .glossary-grid {
        grid-template-columns: 1fr;
      }

      .panel-head,
      .section-head {
        display: grid;
      }

      .process-card::after {
        content: "↓";
        top: auto;
        right: 50%;
        bottom: -18px;
        transform: translateX(50%);
      }

      .process-card {
        margin-bottom: 10px;
      }

      .process-card:last-child {
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell">
      <header>
        <div>
          <div class="title-tools">
            <p class="eyebrow" id="headerEyebrow">AI value chain loop</p>
            <div class="lang-toggle" aria-label="Language switch">
              <button class="lang-button active" data-lang="zh" type="button">中文</button>
              <button class="lang-button" data-lang="en" type="button">English</button>
            </div>
          </div>
          <h1 id="headerTitle">AI 全产业链闭环交互信息图</h1>
          <p class="lead" id="headerLead">从“谁为 AI 付费”开始，沿着应用需求、模型服务、算力基础设施、半导体制造、能源和数据中心资源逐层下钻。每一层都不是公司名单，而是解释业务流程、瓶颈、公司角色和可跟踪的投研观察指标。</p>
        </div>
        <div class="read-card">
          <strong id="readTitle">读图顺序</strong>
          <span id="readStepOne">先看传导链：应用付费变成模型调用，模型调用变成算力采购，算力采购继续传导到芯片、封装、设备、材料、电力和液冷。</span>
          <span id="readStepTwo">再点击任意层级：右侧会切换该层的子赛道、流程、瓶颈、公司角色和观察指标。</span>
        </div>
      </header>

      <div class="content">
        <nav class="flow-strip" id="flowStrip" aria-label="AI 产业链传导层级"></nav>

        <section class="section" id="overviewVisualPanel"></section>

        <section class="workspace">
          <aside class="panel panel-pad">
            <div class="panel-head">
              <h2 id="layerStackTitle">五层产业链</h2>
              <span class="hint" id="layerStackHint">越往下越接近物理瓶颈和资本开支；公司可跨层出现，但角色必须重新定义。</span>
            </div>
            <div class="layer-stack" id="layerStack"></div>
            <div class="audit-list" id="auditList"></div>
          </aside>

          <article class="panel detail" id="detailPanel"></article>
        </section>

        <section class="section" id="visualPanel"></section>

        <section class="section" id="processPanel"></section>

        <section class="section" id="rolePanel"></section>

        <section class="section" id="indicatorVisualPanel"></section>

        <section class="section" id="glossaryPanel"></section>
      </div>
    </section>
  </main>

  <script>
    const layers = [
      {
        id: "application",
        no: "01",
        tone: "application",
        title: "应用需求层",

        "云厂商或 GPU 云用 Kubernetes、Slurm、Ray、虚拟化、监控、安全和计费系统，把底层硬件抽象成可分配资源。": "Cloud providers or GPU clouds use Kubernetes, Slurm, Ray, virtualization, monitoring, security, and billing systems to abstract hardware into allocatable resources.",
        "最终交付 GPU 小时、训练集群、推理 endpoint、裸金属、私有部署或长期租赁容量，并用利用率、故障率和续约反馈扩容。": "The final products are GPU-hours, training clusters, inference endpoints, bare metal, private deployments, or long-term leased capacity, with utilization, failure rates, and renewals feeding the next expansion cycle.",
        "算力路线分叉": "Compute route branches",
        "GPU/HBM 集群、云厂商 ASIC、Cerebras 晶圆级和国产算力是不同硬件路线；比较重点是生态、供给、成本和客户验证。": "GPU/HBM clusters, cloud-provider ASICs, Cerebras wafer-scale systems, and domestic accelerators are different hardware routes; compare ecosystem, supply, cost, and customer validation.",
        "板级 BOM 分叉": "Board-level BOM branch",
        "ABF/interposer 解决芯片封装内连接；PCB/CCL、MLCC、VRM、连接器和 retimer 解决板卡上的供电、信号和机械承载。": "ABF/interposer solve in-package chip connections; PCB/CCL, MLCC, VRM, connectors, and retimers solve board-level power, signal, and mechanical support.",
        "网络路线分叉": "Network route branches",
        "同服务器或整柜看 NVLink/NVSwitch、PCIe/CXL；跨服务器看 InfiniBand、Ethernet/RoCE，远距离高带宽再拉动光模块、光纤和 CPO/LPO。": "Within a server or rack, track NVLink/NVSwitch and PCIe/CXL; across servers, track InfiniBand and Ethernet/RoCE; long-distance high-bandwidth links pull optical modules, fiber, and CPO/LPO.",
        "部署路线分叉": "Deployment route branches",
        "Hyperscaler 自建、GPU 云、IDC 托管、矿场/旧 IDC 改造和企业私有集群，对应不同的电力、融资、客户和运维约束。": "Hyperscaler self-builds, GPU clouds, IDC colocation, mining/legacy IDC conversion, and enterprise private clusters each carry different power, financing, customer, and operations constraints.",
        "散热路线分叉": "Cooling route branches",
        "风冷、冷板液冷和浸没式液冷对应不同机柜功率密度；液冷公司解决热管理，不是生产 GPU。": "Air cooling, cold-plate liquid cooling, and immersion cooling map to different rack power densities; liquid-cooling vendors solve thermal management, not GPU manufacturing.",
        "商业交付分叉": "Commercial delivery branches",
        "收入形态可以是 GPU 小时、长约包量、推理 API、裸金属、私有化交付或 colocation，跟踪指标也应分别看利用率、价格、续约和客户集中度。": "Revenue can come from GPU-hours, committed long-term capacity, inference APIs, bare metal, private deployments, or colocation; metrics should separately track utilization, pricing, renewals, and customer concentration.",

    const glossary = [
      { term: "AI", href: "https://en.wikipedia.org/wiki/Artificial_intelligence", source: "Wikipedia", zh: "人工智能", zhExplain: "AI = Artificial Intelligence，人工智能。让机器执行感知、理解、推理、生成和决策等智能任务的技术集合。", enExplain: "AI means Artificial Intelligence, a field of computing focused on systems that can perceive, reason, generate, and make decisions." },
      { term: "Application demand", href: "https://en.wikipedia.org/wiki/Applications_of_artificial_intelligence", source: "Wikipedia", zh: "应用需求", zhExplain: "具体业务场景对 AI 功能、模型调用和算力资源产生的真实需求。", enExplain: "Real business demand for AI features, model calls, and compute resources in specific use cases." },
      { term: "Model API", href: "https://en.wikipedia.org/wiki/API", source: "Wikipedia", zh: "模型 API", zhExplain: "API = Application Programming Interface，应用编程接口。模型 API 让应用通过标准接口调用生成文本、检索、推理或多模态处理等模型能力。", enExplain: "API means Application Programming Interface. A model API is the standard interface through which applications call model capabilities such as generation, retrieval, reasoning, or multimodal processing." },
      { term: "Private deployment", href: "https://en.wikipedia.org/wiki/On-premises_software", source: "Wikipedia", zh: "私有化部署", zhExplain: "把模型或软件部署在客户自有或受控环境中，以满足数据安全、合规和定制化要求。", enExplain: "Deploying models or software inside a customer-controlled environment for data security, compliance, and customization." },
      { term: "Agent", href: "https://en.wikipedia.org/wiki/Intelligent_agent", source: "Wikipedia", zh: "智能体 / Agent", zhExplain: "能感知上下文、规划步骤、调用工具并执行任务的模型驱动系统。", enExplain: "A model-driven system that can understand context, plan steps, call tools, and execute tasks." },
      { term: "RAG", href: "https://en.wikipedia.org/wiki/Retrieval-augmented_generation", source: "Wikipedia", zh: "检索增强生成", zhExplain: "RAG = Retrieval-Augmented Generation，检索增强生成。先从外部知识库检索相关材料，再让模型基于材料生成回答的方法。", enExplain: "RAG means Retrieval-Augmented Generation, a method that combines external retrieval with model generation to ground answers in relevant material." },
      { term: "SaaS", href: "https://en.wikipedia.org/wiki/Software_as_a_service", source: "Wikipedia", zh: "软件即服务", zhExplain: "SaaS = Software as a Service，软件即服务。用户通过云端订阅使用软件，AI 功能常作为订阅升级或增值模块销售。", enExplain: "SaaS means Software as a Service, software delivered as a cloud subscription; AI features are often sold as upgrades or add-on modules." },
      { term: "ARR", href: "https://en.wikipedia.org/wiki/Annual_recurring_revenue", source: "Wikipedia", zh: "年度经常性收入", zhExplain: "ARR = Annual Recurring Revenue，年度经常性收入。订阅业务一年内可重复获得的收入，用于衡量软件收入的可持续性。", enExplain: "ARR means Annual Recurring Revenue, a metric for the repeatable revenue base of subscription businesses." },
      { term: "ROI", href: "https://en.wikipedia.org/wiki/Return_on_investment", source: "Wikipedia", zh: "投资回报率", zhExplain: "ROI = Return on Investment，投资回报率。衡量投入是否带来足够收益或降本效果，是企业 AI 应用能否续费的核心指标。", enExplain: "ROI means Return on Investment, a measure of whether spending generates enough benefits or cost savings." },
      { term: "Token", href: "https://en.wikipedia.org/wiki/Lexical_analysis#Token", source: "Wikipedia", zh: "词元 / Token", zhExplain: "模型处理文本的基本单位，可以是单词、词片段、符号或字符组合。", enExplain: "The basic text unit processed by language models, such as a word, subword, symbol, or character sequence." },
      { term: "Tokenization", href: "https://en.wikipedia.org/wiki/Lexical_analysis#Tokenization", source: "Wikipedia", zh: "分词 / Tokenize", zhExplain: "把原始文本切分并映射成 token ID，让模型可以进行训练或推理。", enExplain: "The process of splitting text and mapping it into token IDs for training or inference." },
      { term: "Pretraining", href: "https://en.wikipedia.org/wiki/Pre-trained_language_model", source: "Wikipedia", zh: "预训练", zhExplain: "在大规模数据上训练基础模型，使其学习通用语言、代码或多模态能力。", enExplain: "Training a base model on massive data so it learns general language, code, or multimodal capabilities." },
      { term: "SFT", href: "https://en.wikipedia.org/wiki/Fine-tuning_(deep_learning)", source: "Wikipedia", zh: "监督微调", zhExplain: "SFT = Supervised Fine-Tuning，监督微调。用人工构造或筛选的指令-回答样本继续训练模型，让它更会遵循任务。", enExplain: "SFT means Supervised Fine-Tuning, training a model further on curated instruction-response examples." },
      { term: "RLHF", href: "https://en.wikipedia.org/wiki/Reinforcement_learning_from_human_feedback", source: "Wikipedia", zh: "人类反馈强化学习", zhExplain: "RLHF = Reinforcement Learning from Human Feedback，人类反馈强化学习。用人类偏好反馈训练奖励模型，再优化模型输出，使其更符合人类偏好。", enExplain: "RLHF means Reinforcement Learning from Human Feedback, using preference data and reward modeling to align model outputs." },
      { term: "DPO", href: "https://arxiv.org/abs/2305.18290", source: "Research", zh: "直接偏好优化", zhExplain: "DPO = Direct Preference Optimization，直接偏好优化。一种基于偏好样本直接优化模型的对齐方法，常被视为 RLHF 的简化替代路线。", enExplain: "DPO means Direct Preference Optimization, a method that aligns models directly from preference data and is often used as a simpler alternative to RLHF-style pipelines." },
      { term: "GRPO / RLVR", href: "https://arxiv.org/abs/2501.12948", source: "Research", zh: "推理强化学习相关方法", zhExplain: "GRPO = Group Relative Policy Optimization；RLVR = Reinforcement Learning with Verifiable Rewards。两者都常用于强化模型推理能力，依赖分组相对优化或可验证奖励。", enExplain: "GRPO means Group Relative Policy Optimization; RLVR means Reinforcement Learning with Verifiable Rewards. They are reinforcement-style methods used to improve reasoning with group-relative optimization or verifiable rewards." },
      { term: "Dense model", href: "https://en.wikipedia.org/wiki/Artificial_neural_network", source: "Wikipedia", zh: "稠密模型", zhExplain: "推理时通常激活大部分参数的模型结构，部署相对直接但算力消耗较高。", enExplain: "A model architecture that generally activates most parameters each pass, making deployment simpler but compute-heavy." },
      { term: "MoE", href: "https://en.wikipedia.org/wiki/Mixture_of_experts", source: "Wikipedia", zh: "混合专家模型", zhExplain: "MoE = Mixture of Experts，混合专家模型。只激活部分专家网络以节省计算，但会增加路由、通信和调度复杂度。", enExplain: "MoE means Mixture of Experts, a model architecture that activates selected expert blocks to save compute while adding routing, communication, and scheduling complexity." },
      { term: "Inference", href: "https://en.wikipedia.org/wiki/Inference", source: "Wikipedia", zh: "推理", zhExplain: "用训练好的模型处理输入并生成输出，是 AI 应用持续消耗算力的主要来源。", enExplain: "Running a trained model on inputs to produce outputs; a major source of ongoing AI compute demand." },
      { term: "MLOps", href: "https://en.wikipedia.org/wiki/MLOps", source: "Wikipedia", zh: "机器学习运维", zhExplain: "MLOps = Machine Learning Operations，机器学习运维。围绕模型开发、部署、监控、迭代和治理的一套工程流程与工具。", enExplain: "MLOps means Machine Learning Operations, engineering practices and tools for developing, deploying, monitoring, iterating, and governing ML models." },
      { term: "GPU", href: "https://en.wikipedia.org/wiki/Graphics_processing_unit", source: "Wikipedia", zh: "图形处理器", zhExplain: "GPU = Graphics Processing Unit，图形处理器。擅长并行矩阵计算，是训练和推理集群的主流加速器。", enExplain: "GPU means Graphics Processing Unit, a parallel processor well suited to matrix operations and the dominant accelerator in AI training and inference clusters." },
      { term: "HPC", href: "https://en.wikipedia.org/wiki/High-performance_computing", source: "Wikipedia", zh: "高性能计算", zhExplain: "HPC = High-Performance Computing，高性能计算。把高性能服务器、CPU/GPU、内存、网络和存储组成集群，用于处理普通计算机难以承担的大规模科学、工程、金融或 AI 计算任务。", enExplain: "HPC means High-Performance Computing, using clusters of powerful servers, CPUs/GPUs, memory, networking, and storage to solve large scientific, engineering, financial, or AI workloads." },
      { term: "TPU", href: "https://en.wikipedia.org/wiki/Tensor_Processing_Unit", source: "Wikipedia", zh: "张量处理器", zhExplain: "TPU = Tensor Processing Unit，张量处理器。Google 为机器学习工作负载设计的专用加速器系列。", enExplain: "TPU means Tensor Processing Unit, Google's custom accelerator family designed for machine-learning workloads." },
      { term: "ASIC", href: "https://en.wikipedia.org/wiki/Application-specific_integrated_circuit", source: "Wikipedia", zh: "专用集成电路", zhExplain: "ASIC = Application-Specific Integrated Circuit，专用集成电路。为特定任务设计的芯片，AI 场景中常用于定制训练或推理加速。", enExplain: "ASIC means Application-Specific Integrated Circuit, a chip designed for a specific task; in AI it is often used for customized training or inference acceleration." },
      { term: "XPU", href: "https://en.wikipedia.org/wiki/AI_accelerator", source: "Wikipedia", zh: "异构/定制加速器统称", zhExplain: "XPU = X Processing Unit，常作为各类专用或异构处理器的泛称。它泛指 CPU/GPU 之外的各类 AI 加速器，不是单一标准架构。", enExplain: "XPU means X Processing Unit in broad usage, a label for specialized or heterogeneous processors beyond classic CPU/GPU architectures rather than one standard architecture." },
      { term: "CPU", href: "https://en.wikipedia.org/wiki/Central_processing_unit", source: "Wikipedia", zh: "中央处理器", zhExplain: "CPU = Central Processing Unit，中央处理器。通用处理器，负责控制面、数据预处理、系统调度和非加速任务。", enExplain: "CPU means Central Processing Unit, a general-purpose processor used for control, preprocessing, system orchestration, and non-accelerated tasks." },
      { term: "NPU", href: "https://en.wikipedia.org/wiki/AI_accelerator", source: "Wikipedia", zh: "神经网络处理器", zhExplain: "NPU = Neural Processing Unit，神经网络处理器。面向神经网络推理的专用处理器，常出现在手机、PC、汽车和边缘设备中。", enExplain: "NPU means Neural Processing Unit, a neural-network processor for inference commonly used in phones, PCs, cars, and edge devices." },
      { term: "HBM", href: "https://en.wikipedia.org/wiki/High_Bandwidth_Memory", source: "Wikipedia", zh: "高带宽存储器", zhExplain: "HBM = High Bandwidth Memory，高带宽存储器。贴近加速器封装的堆叠式 DRAM，为模型权重、激活值和 KV cache 提供高带宽。", enExplain: "HBM means High Bandwidth Memory, stacked DRAM placed near accelerators to provide high bandwidth for weights, activations, and KV cache." },
      { term: "DRAM", href: "https://en.wikipedia.org/wiki/Dynamic_random-access_memory", source: "Wikipedia", zh: "动态随机存取存储器", zhExplain: "DRAM = Dynamic Random-Access Memory，动态随机存取存储器。需要刷新供电的易失性内存，是服务器内存和 HBM 的基础。", enExplain: "DRAM means Dynamic Random-Access Memory, volatile memory that requires refresh and underpins server memory and HBM." },
      { term: "NAND", href: "https://en.wikipedia.org/wiki/Flash_memory#NAND_flash", source: "Wikipedia", zh: "闪存", zhExplain: "NAND = NOT-AND，来自与非门逻辑结构。NAND flash 是非易失性闪存技术，是 SSD 和企业存储的基础。", enExplain: "NAND means NOT-AND, named after the logic-gate structure. NAND flash is a non-volatile memory technology that underpins SSDs and enterprise storage." },
      { term: "SSD / eSSD", href: "https://en.wikipedia.org/wiki/Solid-state_drive", source: "Wikipedia", zh: "固态硬盘 / 企业级固态硬盘", zhExplain: "SSD = Solid-State Drive，固态硬盘；eSSD = enterprise Solid-State Drive，企业级固态硬盘。用于训练数据、checkpoint、缓存和数据管道，不等同于 HBM。", enExplain: "SSD means Solid-State Drive; eSSD means enterprise Solid-State Drive. They store datasets, checkpoints, caches, and data pipelines; they are not HBM." },
      { term: "KV cache", href: "https://huggingface.co/docs/transformers/en/kv_cache", source: "Official", zh: "键值缓存", zhExplain: "KV cache = Key-Value cache，键值缓存。推理时保存 attention 的 key/value 状态，减少重复计算但会占用显存。", enExplain: "KV cache means Key-Value cache, a cache of attention key/value states during inference that reduces recomputation but consumes memory." },
      { term: "CUDA", href: "https://developer.nvidia.com/cuda-zone", source: "Official", zh: "NVIDIA 并行计算生态", zhExplain: "CUDA = Compute Unified Device Architecture，是 NVIDIA 的 GPU 并行计算平台和编程生态，也是其 AI 算力壁垒之一。", enExplain: "CUDA means Compute Unified Device Architecture in its original expansion; it is NVIDIA's GPU parallel-computing platform and programming ecosystem, a key part of its AI compute moat." },
      { term: "ROCm", href: "https://rocm.docs.amd.com/", source: "Official", zh: "AMD GPU 计算生态", zhExplain: "ROCm = Radeon Open Compute platform，AMD 面向 GPU 加速计算的开放软件栈，用于训练、推理和 HPC。", enExplain: "ROCm means Radeon Open Compute platform, AMD's open GPU compute software stack for training, inference, and HPC workloads." },
      { term: "NVLink", href: "https://www.nvidia.com/en-us/data-center/nvlink/", source: "Official", zh: "NVIDIA 高速互联", zhExplain: "NVLink 是 NVIDIA 的高速互联产品名，不是通用英文缩写。它连接 GPU，用于提高同服务器或系统内 GPU 通信带宽。", enExplain: "NVLink is an NVIDIA high-speed interconnect product name rather than a generic acronym. It connects GPUs to improve GPU-to-GPU bandwidth within servers or systems." },
      { term: "NVSwitch", href: "https://www.nvidia.com/en-us/data-center/nvlink/", source: "Official", zh: "NVIDIA 交换互联芯片", zhExplain: "NVSwitch 是 NVIDIA 基于 NVLink 的交换互联产品名，不是通用英文缩写。它让多颗 GPU 在系统内形成高带宽互联。", enExplain: "NVSwitch is NVIDIA's NVLink-based switching-fabric product name rather than a generic acronym. It connects multiple GPUs with high internal bandwidth." },
      { term: "InfiniBand", href: "https://en.wikipedia.org/wiki/InfiniBand", source: "Wikipedia", zh: "高速网络协议", zhExplain: "InfiniBand 是高速网络技术名称，不是需要展开的英文缩写。它提供低延迟、高吞吐通信，常用于高性能计算和 AI 训练集群。", enExplain: "InfiniBand is the name of a high-speed networking technology rather than an acronym to expand. It provides low-latency, high-throughput communication for HPC and AI training clusters." },
      { term: "Ethernet / RoCE", href: "https://en.wikipedia.org/wiki/RDMA_over_Converged_Ethernet", source: "Wikipedia", zh: "以太网 / 融合以太网上的远程直接内存访问", zhExplain: "RoCE = RDMA over Converged Ethernet，融合以太网上的 RDMA；RDMA = Remote Direct Memory Access，远程直接内存访问。以太网是通用网络基础，RoCE 让低延迟集群通信能在融合以太网上运行。", enExplain: "RoCE means RDMA over Converged Ethernet; RDMA means Remote Direct Memory Access. Ethernet is the broad networking base, while RoCE enables low-latency cluster communication over converged Ethernet." },
      { term: "RDMA", href: "https://en.wikipedia.org/wiki/Remote_direct_memory_access", source: "Wikipedia", zh: "远程直接内存访问", zhExplain: "RDMA = Remote Direct Memory Access，远程直接内存访问。它让一台服务器的网卡直接读写另一台服务器内存，减少 CPU 参与和数据拷贝，常用于 AI/HPC 集群通信。", enExplain: "RDMA means Remote Direct Memory Access. It lets a network adapter access memory on another server with less CPU involvement and fewer data copies, which is useful for AI/HPC cluster communication." },
      { term: "NIC / DPU", href: "https://en.wikipedia.org/wiki/Network_interface_controller", source: "Wikipedia", zh: "网卡 / 数据处理器", zhExplain: "NIC = Network Interface Card / Network Interface Controller，负责把服务器接入网络；DPU = Data Processing Unit，可卸载网络、存储、安全和虚拟化任务。它位于 GPU/CPU 系统和光模块/交换机网络之间，不是光模块，也不是 GPU。", enExplain: "NIC means Network Interface Card / Network Interface Controller and connects the server to the network; DPU means Data Processing Unit and can offload networking, storage, security, and virtualization tasks. It sits between the GPU/CPU system and the optical-module/switch network; it is neither an optical module nor a GPU." },
      { term: "PCIe", href: "https://en.wikipedia.org/wiki/PCI_Express", source: "Wikipedia", zh: "高速外设互联", zhExplain: "PCIe = Peripheral Component Interconnect Express，高速外设互联。服务器中连接 CPU、GPU、网卡、SSD 等设备的高速总线标准。", enExplain: "PCIe means Peripheral Component Interconnect Express, a high-speed bus standard connecting CPUs, GPUs, NICs, SSDs, and other devices inside servers." },
      { term: "CXL", href: "https://en.wikipedia.org/wiki/Compute_Express_Link", source: "Wikipedia", zh: "计算快速链路", zhExplain: "CXL = Compute Express Link，计算快速链路。基于 PCIe 的互联协议，面向内存扩展、缓存一致性和设备互联。", enExplain: "CXL means Compute Express Link, a PCIe-based interconnect protocol for memory expansion, cache coherency, and device connectivity." },
      { term: "Board-level BOM", href: "https://en.wikipedia.org/wiki/Bill_of_materials", source: "Wikipedia", zh: "板级物料清单", zhExplain: "BOM = Bill of Materials，物料清单。板级 BOM 指服务器主板、GPU 加速卡或交换机板上的 PCB、芯片、电容、电感、连接器、retimer 和供电模块等全部物料。它属于系统/板卡供应链，不是单一芯片。", enExplain: "BOM means Bill of Materials. Board-level BOM refers to the PCB, chips, capacitors, inductors, connectors, retimers, power stages, and other parts on a server motherboard, accelerator card, or switch board. It is a system/board supply-chain concept, not a single chip." },
      { term: "PCB", href: "https://en.wikipedia.org/wiki/Printed_circuit_board", source: "Wikipedia", zh: "印刷电路板", zhExplain: "PCB = Printed Circuit Board，印刷电路板。服务器、网卡、GPU 加速卡和交换机里的绿色/黑色板子，承载芯片、连接器、MLCC、VRM 和多层铜走线。它是板级系统承载平台，不等同于芯片封装里的 ABF substrate。", enExplain: "PCB means Printed Circuit Board, the green or black board inside servers, NICs, GPU accelerator cards, and switches. It carries chips, connectors, MLCCs, VRMs, and multilayer copper traces. It is the board-level platform, not the same as an in-package ABF substrate." },
      { term: "CCL", href: "https://en.wikipedia.org/wiki/Copper-clad_laminate", source: "Wikipedia", zh: "覆铜板", zhExplain: "CCL = Copper-Clad Laminate，覆铜板。它是制作 PCB 的基础材料，由绝缘基材和铜箔组成。AI 服务器和高速交换机推动更高层数、更高速低损耗材料需求。", enExplain: "CCL means Copper-Clad Laminate, the base material used to make PCBs. It combines insulating laminate and copper foil. AI servers and high-speed switches push demand toward higher-layer, lower-loss materials." },
      { term: "MLCC", href: "https://en.wikipedia.org/wiki/Ceramic_capacitor#Multi-layer_ceramic_capacitors", source: "Wikipedia", zh: "多层陶瓷电容", zhExplain: "MLCC = Multi-Layer Ceramic Capacitor，多层陶瓷电容。它常密集分布在 GPU、CPU、HBM 和电源模块周围，用于去耦、滤波和稳定电压，帮助高功率板卡可靠运行，但不负责 AI 计算。", enExplain: "MLCC means Multi-Layer Ceramic Capacitor. MLCCs are often placed around GPUs, CPUs, HBM, and power stages for decoupling, filtering, and voltage stabilization. They help high-power boards run reliably but do not perform AI compute." },
      { term: "VRM", href: "https://en.wikipedia.org/wiki/Voltage_regulator_module", source: "Wikipedia", zh: "电压调节模块", zhExplain: "VRM = Voltage Regulator Module，电压调节模块。它把来自电源的电压转换成 GPU、CPU、内存或网卡需要的稳定低电压，是 AI 服务器板级供电链的一部分。", enExplain: "VRM means Voltage Regulator Module. It converts supply voltage into stable lower voltages required by GPUs, CPUs, memory, or NICs, making it part of board-level power delivery in AI servers." },
      { term: "PMIC", href: "https://en.wikipedia.org/wiki/Power_management_integrated_circuit", source: "Wikipedia", zh: "电源管理芯片", zhExplain: "PMIC = Power Management Integrated Circuit，电源管理芯片。它管理电压转换、上电顺序、监控和保护，可出现在服务器板卡、加速器、存储或终端设备中。", enExplain: "PMIC means Power Management Integrated Circuit. It manages voltage conversion, power sequencing, monitoring, and protection, and can appear on server boards, accelerators, storage devices, or endpoints." },
      { term: "Inductor", href: "https://en.wikipedia.org/wiki/Inductor", source: "Wikipedia", zh: "电感", zhExplain: "电感是板级电源电路里的被动元件，常与 VRM/PMIC 和电容一起平滑电流、储能和滤波。AI 加速卡功率上升会提高对高电流供电设计的要求。", enExplain: "An inductor is a passive component used in board-level power circuits. Together with VRMs/PMICs and capacitors, it smooths current, stores energy, and filters noise. Higher-power AI accelerator cards raise requirements for high-current power delivery." },
      { term: "High-speed connector", href: "https://en.wikipedia.org/wiki/Electrical_connector", source: "Wikipedia", zh: "高速连接器", zhExplain: "连接器把板卡、主板、背板、线缆或外部模块接起来。AI 服务器和交换机里的高速连接器关注带宽、通道数、插损、散热和可靠性，不负责路由或计算。", enExplain: "A connector links boards, motherboards, backplanes, cables, or external modules. In AI servers and switches, high-speed connectors are judged by bandwidth, lane count, insertion loss, thermals, and reliability; they do not perform routing or compute." },
      { term: "BGA / solder balls", href: "https://en.wikipedia.org/wiki/Ball_grid_array", source: "Wikipedia", zh: "球栅阵列 / 焊球", zhExplain: "BGA = Ball Grid Array，球栅阵列。芯片封装底部的焊球把封装焊接到 PCB 上，负责电气连接、机械固定和部分热路径。", enExplain: "BGA means Ball Grid Array. Solder balls on the underside of a package attach it to the PCB, providing electrical connection, mechanical attachment, and part of the thermal path." },
      { term: "Signal integrity", href: "https://en.wikipedia.org/wiki/Signal_integrity", source: "Wikipedia", zh: "信号完整性", zhExplain: "信号完整性指高速电信号在 PCB 走线、连接器、封装和线缆中能否以足够低的噪声、损耗和串扰被正确接收。AI 网络和高速板卡会推高 SerDes、retimer、PCB 材料和连接器要求。", enExplain: "Signal integrity is about whether high-speed electrical signals can be received correctly through PCB traces, connectors, packages, and cables with acceptable noise, loss, and crosstalk. AI networking and high-speed boards raise requirements for SerDes, retimers, PCB materials, and connectors." },
      { term: "Switch ASIC", href: "https://en.wikipedia.org/wiki/Network_switch", source: "Wikipedia", zh: "交换芯片", zhExplain: "ASIC = Application-Specific Integrated Circuit。Switch ASIC 是交换机里的专用交换芯片。光信号进交换机端口后先由光模块转回电信号，Switch ASIC 在电域里查表、排队并决定从哪个端口转发出去。", enExplain: "ASIC means Application-Specific Integrated Circuit. A Switch ASIC is the dedicated switching chip inside a switch; after an optical module converts incoming light back into electrical signals, it performs lookup, buffering, and forwarding in the electrical domain." },
      { term: "SerDes", href: "https://en.wikipedia.org/wiki/SerDes", source: "Wikipedia", zh: "串并转换器", zhExplain: "SerDes = Serializer / Deserializer，串并转换器。芯片内部常用并行数据，端口和板级高速链路常用串行数据；SerDes 负责在两者之间转换，是 NIC、Switch ASIC、光模块接口能高速通信的基础。", enExplain: "SerDes means Serializer / Deserializer. Chips often process data internally in parallel, while high-speed ports and board links use serial lanes; SerDes converts between the two for NIC, Switch ASIC, and optical-module interfaces." },
      { term: "DSP", href: "https://en.wikipedia.org/wiki/Digital_signal_processor", source: "Wikipedia", zh: "数字信号处理器", zhExplain: "DSP = Digital Signal Processor / Digital Signal Processing，数字信号处理器/数字信号处理。在高速光模块链路里，DSP 更像信号整理器：补偿高速电信号和光信号在传输中的失真、噪声和串扰，让接收端更容易还原数据。它不负责交换机分流，也不负责 GPU 计算。", enExplain: "DSP means Digital Signal Processor or Digital Signal Processing. In high-speed optical links, a DSP acts like a signal conditioner: it compensates distortion, noise, and crosstalk so the receiver can recover the data. It does not perform switch routing or GPU compute." },
      { term: "Retimer", href: "https://ayarlabs.com/glossary/retimer/", source: "Industry", zh: "重定时器", zhExplain: "用于高速电连接的信号修复芯片。它从衰减的电信号中恢复时钟和数据，再重新发出一份更干净的电信号，常放在 ASIC、连接器或光模块前后以延长可用距离。", enExplain: "A signal-recovery chip for high-speed electrical links. It recovers clock and data from a degraded signal and retransmits a cleaner electrical signal, often around ASICs, connectors, or optical modules to extend reach." },
      { term: "Optical module", href: "https://en.wikipedia.org/wiki/Optical_transceiver", source: "Wikipedia", zh: "光模块", zhExplain: "Optical transceiver，光收发模块。插在服务器网卡或交换机端口上，发送时把电信号转成光信号，接收时把光信号转回电信号；它负责 E/O 和 O/E 转换，不负责路由分流。", enExplain: "An optical module is an optical transceiver plugged into a server NIC or switch port. It converts electrical signals to optical signals on transmit and optical signals back to electrical on receive; it handles E/O and O/E conversion, not routing." },
      { term: "E/O / O/E conversion", href: "https://en.wikipedia.org/wiki/Optical_transceiver", source: "Wikipedia", zh: "电光 / 光电转换", zhExplain: "E/O = Electrical-to-Optical，电到光转换；O/E = Optical-to-Electrical，光到电转换。光模块发送端做 E/O，接收端做 O/E；传统交换机每经过一个主动交换节点通常会发生一次 O/E/O。", enExplain: "E/O means Electrical-to-Optical conversion; O/E means Optical-to-Electrical conversion. Optical modules perform E/O on transmit and O/E on receive; traditional electronic switches usually perform O/E/O at each active switching hop." },
      { term: "QSFP", href: "https://en.wikipedia.org/wiki/Small_form-factor_pluggable_transceiver#QSFP", source: "Wikipedia", zh: "四通道小型可插拔光模块外形", zhExplain: "QSFP = Quad Small Form-factor Pluggable，四通道小型可插拔。它是一类光模块/电缆模块的物理外形和端口规格，常见变体包括 QSFP28、QSFP56、QSFP-DD；它不是以太网或 InfiniBand 协议本身。", enExplain: "QSFP means Quad Small Form-factor Pluggable. It is a physical form factor and port family for pluggable optical or cable modules, with variants such as QSFP28, QSFP56, and QSFP-DD; it is not Ethernet or InfiniBand itself." },
      { term: "OSFP", href: "https://www.osfpmsa.org/", source: "Standards", zh: "八通道小型可插拔光模块外形", zhExplain: "OSFP = Octal Small Form-factor Pluggable，八通道小型可插拔。它是面向高速数据中心链路的可插拔光模块外形，通常给 400G、800G、1.6T 等更高功率/更高带宽模块预留更好的散热和信号空间。", enExplain: "OSFP means Octal Small Form-factor Pluggable. It is a pluggable-module form factor for high-speed data-center links, designed with thermal and signal-integrity headroom for higher-power, higher-bandwidth modules such as 400G, 800G, and 1.6T." },
      { term: "Optical patch panel", href: "https://en.wikipedia.org/wiki/Patch_panel", source: "Wikipedia", zh: "光纤配线架", zhExplain: "数据中心里用于光纤跳接、整理和维护的被动面板。它不做电光转换，不转发数据包，也不能替代交换机；真正分流发生在 Switch ASIC。", enExplain: "A passive panel for fiber cross-connection, cable management, and maintenance in data centers. It does not convert signals, forward packets, or replace a switch; forwarding happens in the Switch ASIC." },
      { term: "EML", href: "https://en.wikipedia.org/wiki/Electro-absorption_modulator", source: "Wikipedia", zh: "电吸收调制激光器", zhExplain: "EML = Electro-absorption Modulated Laser，电吸收调制激光器。高速光模块中常用的调制器/激光器路线，适合高速长距离数据传输。", enExplain: "EML means Electro-absorption Modulated Laser, a modulator/laser route used in high-speed optical modules for data transmission." },
      { term: "Silicon photonics", href: "https://en.wikipedia.org/wiki/Silicon_photonics", source: "Wikipedia", zh: "硅光", zhExplain: "用硅工艺集成光学器件，目标是提高带宽、降低功耗并提升集成度。", enExplain: "Integrating optical components with silicon processes to improve bandwidth, power efficiency, and integration density." },
      { term: "CPO", href: "https://www.oiforum.com/technical-work/hot-topics/energy-efficient-interfaces/", source: "Standards", zh: "共封装光学", zhExplain: "CPO = Co-Packaged Optics，共封装光学。把光引擎放到交换芯片附近，缩短 Switch ASIC 到光引擎之间的高速电连接，以降低功耗和信号损耗。它主要改变交换机端口实现方式，不等于 GPU 直接变成光信号。", enExplain: "CPO means Co-Packaged Optics. It places optical engines close to the switch ASIC, shortening the high-speed electrical path to reduce power and signal loss. It mainly changes switch-port implementation; it does not mean the GPU directly becomes optical." },
      { term: "LPO", href: "https://www.lpo-msa.org/files/live/sites/lpomsa/files/specs/LPO_MSA_Specification_v1p01.pdf", source: "Standards", zh: "线性直驱光学", zhExplain: "LPO = Linear Pluggable Optics，线性直驱光学。通过减少或取消光模块内部 DSP 来降低功耗和成本，但更依赖交换芯片、SerDes、PCB 和链路调校能力。", enExplain: "LPO means Linear Pluggable Optics. It reduces or removes the module-side DSP to lower power and cost, but depends more heavily on the switch ASIC, SerDes, PCB channel, and link tuning." },
      { term: "AI server", href: "https://en.wikipedia.org/wiki/Server_(computing)", source: "Wikipedia", zh: "AI 服务器", zhExplain: "AI server = Artificial Intelligence server，AI 服务器。集成加速器、CPU、内存、网络、电源和散热的服务器，用于训练和推理。", enExplain: "AI server means Artificial Intelligence server, a server integrating accelerators, CPUs, memory, networking, power, and cooling for training and inference." },
      { term: "ODM / OEM", href: "https://en.wikipedia.org/wiki/Original_design_manufacturer", source: "Wikipedia", zh: "原始设计制造 / 原始设备制造", zhExplain: "ODM = Original Design Manufacturer，原始设计制造商；OEM = Original Equipment Manufacturer，原始设备制造商。它们是服务器和硬件供应链中的设计制造与品牌制造模式。", enExplain: "ODM means Original Design Manufacturer; OEM means Original Equipment Manufacturer. They describe design-manufacturing and branded-manufacturing models used in server and hardware supply chains." },
      { term: "Rack-scale system", href: "https://www.opencompute.org/projects/rack-and-power", source: "Industry", zh: "整柜系统", zhExplain: "以整柜为交付单位，把服务器、网络、电源和散热作为一体化系统设计。", enExplain: "A full-rack delivery model that designs servers, networking, power, and cooling as an integrated system." },
      { term: "Liquid cooling", href: "https://en.wikipedia.org/wiki/Computer_cooling#Liquid_cooling", source: "Wikipedia", zh: "液冷", zhExplain: "用液体带走芯片和机柜热量，适合高功率密度 AI 服务器。", enExplain: "Cooling that uses liquid to remove heat from chips and racks, suitable for high-power-density AI servers." },
      { term: "CDU", href: "https://www.eaton.com/us/en-us/markets/data-centers/data-center-cooling/cdus/coolant-distribution-unit-technical-paper.html", source: "Official", zh: "冷却液分配单元", zhExplain: "CDU = Coolant Distribution Unit，冷却液分配单元。液冷系统中连接设施侧冷源和 IT 侧回路的设备，负责流量、温度和压力控制。", enExplain: "CDU means Coolant Distribution Unit, a device that connects facility cooling to IT liquid loops and manages flow, temperature, and pressure." },
      { term: "IDC", href: "https://en.wikipedia.org/wiki/Data_center", source: "Wikipedia", zh: "互联网数据中心", zhExplain: "IDC = Internet Data Center，互联网数据中心。承载服务器、网络、电力和冷却设施的数据中心资源，是 AI 算力落地的物理载体。", enExplain: "IDC means Internet Data Center, data-center infrastructure that hosts servers, networking, power, and cooling as the physical base for AI compute." },
      { term: "Colocation", href: "https://en.wikipedia.org/wiki/Colocation_centre", source: "Wikipedia", zh: "托管型数据中心服务", zhExplain: "客户自有设备放在第三方数据中心内，由后者提供空间、电力、冷却和网络。", enExplain: "A service where customer-owned equipment is hosted in a third-party data center with space, power, cooling, and network access." },
      { term: "GPU cloud", href: "https://en.wikipedia.org/wiki/Cloud_computing", source: "Wikipedia", zh: "GPU 云", zhExplain: "GPU cloud = Graphics Processing Unit cloud，GPU 云。按需租用 GPU 或 AI 加速器资源的云服务，常用于训练、微调和推理。", enExplain: "GPU cloud means Graphics Processing Unit cloud, a cloud service that rents GPU or AI accelerator capacity for training, fine-tuning, and inference." },
      { term: "CapEx", href: "https://en.wikipedia.org/wiki/Capital_expenditure", source: "Wikipedia", zh: "资本开支", zhExplain: "CapEx = Capital Expenditure，资本开支。用于购买或建设长期资产的支出，如服务器、数据中心、电力设备和产线。", enExplain: "CapEx means Capital Expenditure, spending to acquire or build long-lived assets such as servers, data centers, power equipment, and production lines." },
      { term: "Fabless", href: "https://en.wikipedia.org/wiki/Fabless_manufacturing", source: "Wikipedia", zh: "无晶圆设计", zhExplain: "公司负责芯片设计和销售，但将晶圆制造外包给代工厂。", enExplain: "A model in which a company designs and sells chips while outsourcing wafer fabrication to foundries." },
      { term: "Foundry", href: "https://en.wikipedia.org/wiki/Semiconductor_foundry", source: "Wikipedia", zh: "晶圆代工厂", zhExplain: "为芯片设计公司制造晶圆的半导体制造企业。", enExplain: "A semiconductor manufacturer that fabricates wafers for chip-design customers." },
      { term: "Wafer fabrication", href: "https://en.wikipedia.org/wiki/Semiconductor_device_fabrication", source: "Wikipedia", zh: "晶圆制造", zhExplain: "通过光刻、沉积、刻蚀、离子注入、清洗和量检测等步骤在晶圆上制造芯片。", enExplain: "Manufacturing chips on wafers through lithography, deposition, etch, implantation, cleaning, and metrology steps." },
      { term: "Advanced node", href: "https://en.wikipedia.org/wiki/Semiconductor_device_fabrication#Technology_node", source: "Wikipedia", zh: "先进制程", zhExplain: "更高晶体管密度和能效的先进工艺节点，如 3nm、2nm 等。", enExplain: "Leading-edge process nodes with higher transistor density and energy efficiency, such as 3nm or 2nm." },
      { term: "CoWoS", href: "https://en.wikipedia.org/wiki/Advanced_packaging_(semiconductors)", source: "Wikipedia", zh: "台积电先进封装技术", zhExplain: "CoWoS = Chip-on-Wafer-on-Substrate，是 TSMC 用于整合逻辑芯片和 HBM 的先进封装平台。", enExplain: "CoWoS means Chip-on-Wafer-on-Substrate, TSMC's advanced packaging platform for integrating logic die and HBM." },
      { term: "2.5D / 3D packaging", href: "https://en.wikipedia.org/wiki/2.5D_integrated_circuit", source: "Wikipedia", zh: "2.5D / 3D 封装", zhExplain: "2.5D = two-and-a-half-dimensional packaging；3D = three-dimensional packaging。通过中介层、垂直堆叠或混合键合连接多个芯粒和存储器，提高带宽和集成度。", enExplain: "2.5D means two-and-a-half-dimensional packaging; 3D means three-dimensional packaging. These advanced packaging routes connect chiplets and memory through interposers, vertical stacking, or hybrid bonding for higher bandwidth and integration." },
      { term: "Interposer", href: "https://en.wikipedia.org/wiki/Interposer", source: "Wikipedia", zh: "中介层", zhExplain: "位于芯片和封装基板之间的连接层，用于高密度互连 GPU、HBM 等芯粒。", enExplain: "An intermediate layer between die and package substrate used for dense interconnects among GPUs, HBM, and chiplets." },
      { term: "ABF substrate", href: "https://www.ajinomoto.com/innovation/our_innovation/buildupfilm", source: "Official", zh: "ABF 载板", zhExplain: "ABF = Ajinomoto Build-up Film。ABF substrate 是使用 ABF 材料的高端芯片封装基板，位于 silicon interposer/芯片封装和外部 PCB 之间，负责扇出信号和电源。它属于先进封装材料，不是普通服务器 PCB。", enExplain: "ABF means Ajinomoto Build-up Film. An ABF substrate is a high-end chip package substrate between the silicon interposer/package and the external PCB, fanning out signals and power. It belongs to advanced packaging materials, not ordinary server PCB." },
      { term: "TSV", href: "https://en.wikipedia.org/wiki/Through-silicon_via", source: "Wikipedia", zh: "硅通孔", zhExplain: "TSV = Through-Silicon Via，硅通孔。穿透硅片的垂直互连结构，是 HBM 堆叠和 3D 封装的重要技术。", enExplain: "TSV means Through-Silicon Via, a vertical interconnect through silicon that is important for HBM stacking and 3D packaging." },
      { term: "OSAT", href: "https://semiengineering.com/knowledge_centers/packaging/outsourced-semiconductor-assembly-and-test/", source: "Industry", zh: "封装测试代工", zhExplain: "OSAT = Outsourced Semiconductor Assembly and Test，外包半导体封装测试。为芯片公司提供封装、组装和测试服务的半导体后道厂商。", enExplain: "OSAT means Outsourced Semiconductor Assembly and Test, providers that perform chip packaging, assembly, and testing for semiconductor companies." },
      { term: "EDA / IP", href: "https://en.wikipedia.org/wiki/Electronic_design_automation", source: "Wikipedia", zh: "电子设计自动化 / 知识产权模块", zhExplain: "EDA = Electronic Design Automation，电子设计自动化；IP = Intellectual Property，知识产权模块。EDA 是芯片设计软件工具，IP 是可复用的设计模块或接口。", enExplain: "EDA means Electronic Design Automation; IP means Intellectual Property. EDA is chip-design software tooling, while IP refers to reusable design blocks or interfaces." },
      { term: "EUV / DUV", href: "https://en.wikipedia.org/wiki/Extreme_ultraviolet_lithography", source: "Wikipedia", zh: "极紫外 / 深紫外光刻", zhExplain: "EUV = Extreme Ultraviolet，极紫外；DUV = Deep Ultraviolet，深紫外。二者都是半导体光刻技术路线，用于把电路图形转移到晶圆上，EUV 常用于先进节点。", enExplain: "EUV means Extreme Ultraviolet; DUV means Deep Ultraviolet. Both are lithography routes used to transfer circuit patterns onto wafers, with EUV used for leading-edge nodes." },
      { term: "Etch", href: "https://en.wikipedia.org/wiki/Etching_(microfabrication)", source: "Wikipedia", zh: "刻蚀", zhExplain: "在晶圆制造中选择性去除材料，把图形转移到薄膜或硅基底中。", enExplain: "A microfabrication step that selectively removes material to transfer patterns into films or silicon." },
      { term: "Deposition", href: "https://en.wikipedia.org/wiki/Thin-film_deposition", source: "Wikipedia", zh: "薄膜沉积", zhExplain: "在晶圆表面形成薄膜材料的工艺，包括 CVD = Chemical Vapor Deposition，PVD = Physical Vapor Deposition，ALD = Atomic Layer Deposition 等路线。", enExplain: "Thin-film processes that form materials on wafer surfaces, including CVD = Chemical Vapor Deposition, PVD = Physical Vapor Deposition, and ALD = Atomic Layer Deposition." },
      { term: "CMP", href: "https://en.wikipedia.org/wiki/Chemical-mechanical_polishing", source: "Wikipedia", zh: "化学机械抛光", zhExplain: "CMP = Chemical Mechanical Planarization / Chemical Mechanical Polishing，化学机械平坦化/抛光。通过化学和机械作用平坦化晶圆表面，是多层互连制造的重要步骤。", enExplain: "CMP means Chemical Mechanical Planarization or Chemical Mechanical Polishing, a process that planarizes wafer surfaces and is critical for multilayer interconnect fabrication." },
      { term: "Metrology / inspection", href: "https://en.wikipedia.org/wiki/Semiconductor_metrology", source: "Wikipedia", zh: "量测 / 检测", zhExplain: "测量和检查晶圆图形、缺陷、膜厚和关键尺寸，以控制良率。", enExplain: "Measurement and inspection of wafer patterns, defects, film thickness, and critical dimensions for yield control." },
      { term: "ATE", href: "https://en.wikipedia.org/wiki/Automatic_test_equipment", source: "Wikipedia", zh: "自动测试设备", zhExplain: "ATE = Automatic Test Equipment，自动测试设备。用于自动测试芯片、电路板或系统性能与缺陷的设备。", enExplain: "ATE means Automatic Test Equipment, automated equipment used to test chips, boards, or systems for performance and defects." },
      { term: "PPA", href: "https://en.wikipedia.org/wiki/Power_purchase_agreement", source: "Wikipedia", zh: "购电协议", zhExplain: "PPA = Power Purchase Agreement，购电协议。长期购电合同，用于锁定电力来源、价格和供给期限。", enExplain: "PPA means Power Purchase Agreement, a long-term power contract used to secure electricity supply, price, and duration." },
      { term: "BESS", href: "https://en.wikipedia.org/wiki/Battery_energy_storage_system", source: "Wikipedia", zh: "电池储能系统", zhExplain: "BESS = Battery Energy Storage System，电池储能系统。用电池储存电能并在需要时释放，用于削峰填谷、备电和可再生能源平滑。", enExplain: "BESS means Battery Energy Storage System, a battery system that stores electricity and releases it for peak shaving, backup, and renewable smoothing." },
      { term: "UPS", href: "https://en.wikipedia.org/wiki/Uninterruptible_power_supply", source: "Wikipedia", zh: "不间断电源", zhExplain: "UPS = Uninterruptible Power Supply，不间断电源。在电网故障或电压波动时提供短时持续电力，保护服务器和数据中心设备。", enExplain: "UPS means Uninterruptible Power Supply, a power system that provides short-term backup power during outages or voltage disturbances." },
      { term: "PDU", href: "https://en.wikipedia.org/wiki/Power_distribution_unit", source: "Wikipedia", zh: "配电单元", zhExplain: "PDU = Power Distribution Unit，配电单元。把电力分配到机柜和设备的装置，是数据中心供电链的一环。", enExplain: "PDU means Power Distribution Unit, a device that distributes power to racks and equipment as part of the data-center power chain." },
      { term: "DCIM", href: "https://en.wikipedia.org/wiki/Data_center_infrastructure_management", source: "Wikipedia", zh: "数据中心基础设施管理", zhExplain: "DCIM = Data Center Infrastructure Management，数据中心基础设施管理。用于监控和管理数据中心电力、冷却、空间、资产和容量的软件系统。", enExplain: "DCIM means Data Center Infrastructure Management, software for monitoring and managing data-center power, cooling, space, assets, and capacity." },
      { term: "EMS", href: "https://en.wikipedia.org/wiki/Energy_management_system", source: "Wikipedia", zh: "能源管理系统", zhExplain: "EMS = Energy Management System，能源管理系统。监控和调度能源使用、电价、储能、负荷和效率的系统。", enExplain: "EMS means Energy Management System, a system for monitoring and optimizing energy use, pricing, storage, load, and efficiency." },
      { term: "PUE", href: "https://en.wikipedia.org/wiki/Power_usage_effectiveness", source: "Wikipedia", zh: "电能使用效率", zhExplain: "PUE = Power Usage Effectiveness，电能使用效率。数据中心总耗电与 IT 设备耗电的比值，越接近 1 表示越高效。", enExplain: "PUE means Power Usage Effectiveness, the ratio of total data-center energy to IT-equipment energy; closer to 1 is better." },
      { term: "MW", href: "https://en.wikipedia.org/wiki/Watt#Megawatt", source: "Wikipedia", zh: "兆瓦", zhExplain: "MW = Megawatt，兆瓦。功率单位，数据中心常用 MW 表示可接入或已签约电力容量。", enExplain: "MW means Megawatt, a unit of power commonly used to describe data-center contracted or available power capacity." }
    ];

    let activeLayer = "compute";
    let lang = "zh";

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function ui(key) {
      return uiText[lang][key] || uiText.zh[key] || key;
    }

    function tr(value) {
      if (lang === "zh") return value;
      return translations.en[value] || value;
    }

    function copy(value) {
      if (value && typeof value === "object") return value[lang] || value.zh || value.en || "";
      return tr(value);
    }

    function renderStaticText() {
      document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
      document.title = ui("documentTitle");
      document.getElementById("headerEyebrow").textContent = ui("headerEyebrow");
      document.getElementById("headerTitle").textContent = ui("headerTitle");
      document.getElementById("headerLead").textContent = ui("headerLead");
      document.getElementById("readTitle").textContent = ui("readTitle");
      document.getElementById("readStepOne").textContent = ui("readStepOne");
      document.getElementById("readStepTwo").textContent = ui("readStepTwo");
      document.getElementById("flowStrip").setAttribute("aria-label", ui("flowAria"));
      document.getElementById("layerStackTitle").textContent = ui("layerStackTitle");
      document.getElementById("layerStackHint").textContent = ui("layerStackHint");
      document.querySelectorAll("[data-lang]").forEach(button => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });
    }

    function renderAudit() {
      document.getElementById("auditList").innerHTML = `
        <h3>${escapeHtml(ui("auditTitle"))}</h3>
        ${ui("auditItems").map(item => `<p>${escapeHtml(item)}</p>`).join("")}
      `;
    }

    function currentLayer() {
      return layers.find(layer => layer.id === activeLayer) || layers[2];
    }

    function setActiveLayer(id) {
      activeLayer = id;
      renderAll();
    }

    function renderFlowStrip() {
      document.getElementById("flowStrip").innerHTML = layers.map(layer => `
        <button class="flow-step ${escapeHtml(layer.tone)} ${layer.id === activeLayer ? "active" : ""}" data-layer="${escapeHtml(layer.id)}">
          <em>${escapeHtml(layer.no)} / ${escapeHtml(tr(layer.short))}</em>
          <strong>${escapeHtml(tr(layer.title))}</strong>
          <span>${escapeHtml(tr(layer.question))}</span>
        </button>
      `).join("");
      document.querySelectorAll(".flow-step").forEach(button => {
        button.addEventListener("click", () => setActiveLayer(button.dataset.layer));
      });
    }

    function renderLayerStack() {
      document.getElementById("layerStack").innerHTML = layers.map(layer => `
        <button class="layer-button ${escapeHtml(layer.tone)} ${layer.id === activeLayer ? "active" : ""}" data-layer="${escapeHtml(layer.id)}">
          <span class="layer-no">${escapeHtml(layer.no)}</span>
          <span>
            <h3>${escapeHtml(tr(layer.title))}</h3>
            <p>${escapeHtml(tr(layer.summary))}</p>
          </span>
        </button>
      `).join("");
      document.querySelectorAll(".layer-button").forEach(button => {
        button.addEventListener("click", () => setActiveLayer(button.dataset.layer));
      });
    }

    function renderPills(items) {
      return `<div class="pill-list">${items.map(item => `<span class="pill">${escapeHtml(tr(item))}</span>`).join("")}</div>`;
    }

    function renderVisualCards(items) {
      return `
        <div class="visual-grid ${items.length === 1 ? "single" : ""}">
          ${items.map(item => `
            <article class="visual-card ${item.wide ? "wide" : ""}">
              <img src="${escapeHtml(item.image)}" alt="${escapeHtml(copy(item.title))}" loading="lazy">
              <div class="visual-copy">
                <h3>${escapeHtml(copy(item.title))}</h3>
                <p>${escapeHtml(copy(item.caption))}</p>
                ${item.points ? `
                  <div class="visual-points">
                    ${item.points.map(point => `
                      <div class="visual-point">
                        <strong>${escapeHtml(copy(point.label))}</strong>
                        <span>${escapeHtml(copy(point.text))}</span>
                      </div>
                    `).join("")}
                  </div>
                ` : ""}
              </div>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderOverviewVisual() {
      document.getElementById("overviewVisualPanel").innerHTML = `
        <div class="section-head">
          <div>
            <p class="eyebrow">${escapeHtml(ui("overviewVisualKicker"))}</p>
            <h2>${escapeHtml(ui("overviewVisualTitle"))}</h2>
          </div>
          <span class="hint">${escapeHtml(ui("overviewVisualHint"))}</span>
        </div>
        ${renderVisualCards([overviewVisual])}
      `;
    }

    function renderLayerVisuals() {
      const visuals = layerVisuals[activeLayer] || [];
      const panel = document.getElementById("visualPanel");
      panel.hidden = visuals.length === 0;
      panel.innerHTML = visuals.length ? `
        <div class="section-head">
          <div>
            <p class="eyebrow">${escapeHtml(ui("layerVisualKicker"))}</p>
            <h2>${escapeHtml(ui("layerVisualTitle"))}</h2>
          </div>
          <span class="hint">${escapeHtml(ui("layerVisualHint"))}</span>
        </div>
        ${renderVisualCards(visuals)}
      ` : "";
    }

    function renderIndicatorVisual() {
      document.getElementById("indicatorVisualPanel").innerHTML = `
        <div class="section-head">
          <div>
            <p class="eyebrow">${escapeHtml(ui("indicatorVisualKicker"))}</p>
            <h2>${escapeHtml(ui("indicatorVisualTitle"))}</h2>
          </div>
          <span class="hint">${escapeHtml(ui("indicatorVisualHint"))}</span>
        </div>
        ${renderVisualCards([indicatorVisual])}
      `;
    }

    function renderDetail() {
      const layer = currentLayer();
      const companyCards = layer.companies.map(([name, role, signal]) => `
        <article class="company-card">
          <h4>${escapeHtml(tr(name))}</h4>
          <p>${escapeHtml(tr(role))}</p>
          <small>${escapeHtml(ui("observation"))}：${escapeHtml(tr(signal))}</small>
        </article>
      `).join("");
      document.getElementById("detailPanel").innerHTML = `
        <div class="detail-head ${escapeHtml(layer.tone)}">
          <p class="eyebrow">Layer ${escapeHtml(layer.no)} ${escapeHtml(ui("layerOverview"))}</p>
          <h2>${escapeHtml(tr(layer.title))}</h2>
          <p class="summary">${escapeHtml(tr(layer.summary))}</p>
        </div>
        <div class="detail-body">
          <div class="meta-grid">
            <div class="meta-box"><strong>${escapeHtml(ui("input"))}</strong><span>${escapeHtml(tr(layer.input))}</span></div>
            <div class="meta-box"><strong>${escapeHtml(ui("output"))}</strong><span>${escapeHtml(tr(layer.output))}</span></div>
            <div class="meta-box"><strong>${escapeHtml(ui("pressure"))}</strong><span>${escapeHtml(tr(layer.pressure))}</span></div>
          </div>
          <div class="chain">
            ${layer.flow.map((step, index) => `${index > 0 ? "<i>→</i>" : ""}<b>${escapeHtml(tr(step))}</b>`).join("")}
          </div>
          <div class="info-grid">
            <div class="info-card"><strong>${escapeHtml(ui("sectors"))}</strong>${renderPills(layer.sectors)}</div>
            <div class="info-card"><strong>${escapeHtml(ui("bottlenecks"))}</strong>${renderPills(layer.bottlenecks)}</div>
            <div class="info-card"><strong>${escapeHtml(ui("watch"))}</strong>${renderPills(layer.watch)}</div>
          </div>
          <div>
            <div class="panel-head">
              <h2>${escapeHtml(ui("companies"))}</h2>
              <span class="hint">${escapeHtml(ui("companyHint"))}</span>
            </div>
            <div class="company-grid">${companyCards}</div>
          </div>
          <div class="info-card">
            <strong>${escapeHtml(ui("guardrails"))}</strong>
            ${renderPills(layer.guardrails)}
          </div>
        </div>
      `;
    }

    function renderProcess() {
      const layer = currentLayer();
      const workflowVisual = workflowVisuals[activeLayer];
      const cols = layer.process.length > 6 ? 4 : Math.min(Math.max(layer.process.length, 3), 6);
      const branches = layer.branches ? `
        <div class="branch-grid">
          ${layer.branches.map(([title, text]) => `
            <article class="process-card">
              <em>${escapeHtml(ui("branch"))}</em>
              <h3>${escapeHtml(tr(title))}</h3>
              <p>${escapeHtml(tr(text))}</p>
            </article>
          `).join("")}
        </div>
      ` : "";
      document.getElementById("processPanel").innerHTML = `
        <div class="section-head">
          <div>
            <p class="eyebrow">${escapeHtml(ui("workflowKicker"))}</p>
            <h2>${escapeHtml(tr(layer.title))}${escapeHtml(ui("workflowSuffix"))}</h2>
          </div>
          <span class="hint">${escapeHtml(ui("workflowHint"))}</span>
        </div>
        ${workflowVisual ? renderVisualCards([workflowVisual]) : ""}
        <div class="process-grid" style="--cols:${cols}">
          ${layer.process.map(([label, title, text]) => `
            <article class="process-card">
              <em>${escapeHtml(label)}</em>
              <h3>${escapeHtml(tr(title))}</h3>
              <p>${escapeHtml(tr(text))}</p>
            </article>
          `).join("")}
        </div>
        ${branches}
      `;
    }

    function renderRoleMatrix() {
      document.getElementById("rolePanel").innerHTML = `
        <div class="section-head">
          <div>
            <p class="eyebrow">${escapeHtml(ui("roleKicker"))}</p>
            <h2>${escapeHtml(ui("roleTitle"))}</h2>
          </div>
          <span class="hint">${escapeHtml(ui("roleHint"))}</span>
        </div>
        <div class="role-grid">
          ${roleMatrix.map(([name, roles, caution]) => {
            const isActive = Boolean(roles[activeLayer]);
            const chips = Object.entries(roles).map(([layerId, role]) => {
              const layer = layers.find(item => item.id === layerId);
              return `<span class="role-chip ${layerId === activeLayer ? "current" : ""}">${escapeHtml(layer ? tr(layer.short) : layerId)}：${escapeHtml(tr(role))}</span>`;
            }).join("");
            return `
              <article class="role-card ${isActive ? "active" : ""}">
                <h3>${escapeHtml(tr(name))}</h3>
                <div class="role-chip-row">${chips}</div>
                <p>${escapeHtml(tr(caution))}</p>
              </article>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderGlossary() {
      document.getElementById("glossaryPanel").innerHTML = `
        <div class="section-head">
          <div>
            <p class="eyebrow">${escapeHtml(ui("glossaryKicker"))}</p>
            <h2>${escapeHtml(ui("glossaryTitle"))}</h2>
          </div>
          <span class="hint">${escapeHtml(ui("glossaryHint"))}</span>
        </div>
        <p class="disclaimer">${escapeHtml(ui("glossaryIntro"))}</p>
        <div class="glossary-grid">
          ${glossary.map(item => `
            <article class="term-card">
              <a href="${escapeHtml(item.href)}" target="_blank" rel="noopener">${escapeHtml(item.term)}</a>
              <span>${escapeHtml(item.zh)}</span>
              <p><b>中文解释：</b> ${escapeHtml(item.zhExplain)}</p>
              <p><b>English explanation:</b> ${escapeHtml(item.enExplain)}</p>
              <em>${escapeHtml(item.source)}</em>
            </article>
          `).join("")}
        </div>
      `;
    }

    function renderAll() {
      renderStaticText();
      renderAudit();
      renderFlowStrip();
      renderOverviewVisual();
      renderLayerStack();
      renderDetail();
      renderLayerVisuals();
      renderProcess();
      renderRoleMatrix();
      renderIndicatorVisual();
      renderGlossary();
    }

    document.querySelectorAll("[data-lang]").forEach(button => {
      button.addEventListener("click", () => {
        lang = button.dataset.lang === "en" ? "en" : "zh";
        renderAll();
      });
    });

    renderAll();
  </script>
</body>
</html>
